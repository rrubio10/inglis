<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge English Practice</title>
  <style>
    :root {
      --bg-1: #4f46e5;
      --bg-2: #7c3aed;
      --card: rgba(255,255,255,0.96);
      --muted: #6b7280;
      --text: #111827;
      --soft-blue: #eef2ff;
      --soft-violet: #f5f3ff;
      --blue: #3730a3;
      --blue-2: #6366f1;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --orange: #f59e0b;
      --orange-bg: #fff7ed;
      --border: #e5e7eb;
      --shadow: 0 18px 42px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      padding: 1.25rem;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .header {
      color: white;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 0.45rem;
    }

    .header p {
      opacity: 0.95;
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card, .panel-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel-card {
      padding: 1.35rem;
      margin-bottom: 1.25rem;
    }

    .set-grid, .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.2rem;
    }

    .set-card, .type-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 1.4rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 2px solid transparent;
    }

    .set-card:hover, .type-card:hover {
      transform: translateY(-4px);
      border-color: #c7d2fe;
      box-shadow: 0 22px 50px rgba(0,0,0,0.22);
    }

    .set-card h3, .type-card h3 {
      font-size: 1.25rem;
      margin-bottom: 0.55rem;
      color: #111827;
    }

    .set-card p, .type-card p, .meta-line {
      color: var(--muted);
      line-height: 1.55;
    }

    .set-meta, .type-meta {
      margin-top: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.42rem 0.8rem;
      background: var(--soft-blue);
      color: var(--blue);
      font-weight: 700;
      font-size: 0.88rem;
    }

    .pill.secondary {
      background: var(--soft-violet);
      color: #6d28d9;
    }

    .pill.count {
      background: #ecfccb;
      color: #3f6212;
    }

    .info-banner, .result-summary, .explanation, .source-box, .loader-box {
      border-radius: 18px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }

    .info-banner, .source-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .result-summary {
      display: none;
      background: #ecfeff;
      border: 1px solid #a5f3fc;
    }

    .result-summary.show, .explanation.show {
      display: block;
    }

    .explanation {
      display: none;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .exercise-screen .card {
      padding: 1.25rem;
    }

    .progress-section { margin-bottom: 1rem; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
    }

    .progress-header h2 {
      font-size: 1.2rem;
      color: #111827;
      line-height: 1.4;
    }

    .exercise-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: white;
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .progress-bar {
      width: 100%;
      height: 9px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--bg-1), var(--bg-2));
      transition: width 0.25s ease;
    }

    .exercise-title {
      font-size: clamp(1.55rem, 3vw, 2.1rem);
      margin-bottom: 0.45rem;
      color: #111827;
    }

    .exercise-subtitle {
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 0.8rem;
    }

    .exercise-passage {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .exercise-passage p {
      line-height: 2;
      font-size: 1.03rem;
      color: #111827;
      margin-bottom: 1rem;
    }

    .exercise-passage p:last-child {
      margin-bottom: 0;
    }

    .inline-gap {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin: 0 0.1rem;
      vertical-align: middle;
    }

    .gap-number {
      font-weight: 800;
      color: var(--blue);
      white-space: nowrap;
    }

    .gap-line {
      display: inline-block;
      width: 90px;
      border-bottom: 2px solid #6366f1;
      transform: translateY(-1px);
    }

    .gap-base-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.15rem 0.42rem;
      border-radius: 8px;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.08rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: #111827;
    }

    .question-list, .answer-grid, .transformation-list {
      display: grid;
      gap: 1rem;
    }

    .question-card, .answer-card, .transform-item {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 1rem;
    }

    .question-header, .answer-card-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.85rem;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .question-number-badge, .gap-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 42px;
      padding: 0 0.6rem;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-weight: 800;
    }

    .question-card-title {
      font-weight: 700;
      color: #111827;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .option-button {
      width: 100%;
      text-align: left;
      border: 2px solid #dbe4ff;
      background: white;
      border-radius: 14px;
      padding: 0.9rem 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.98rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .option-button:hover:not(:disabled) {
      border-color: var(--blue-2);
      transform: translateY(-1px);
      background: #f8faff;
    }

    .option-button.selected {
      border-color: var(--blue-2);
      background: var(--soft-blue);
    }

    .option-button.correct {
      border-color: var(--green);
      background: var(--green-bg);
    }

    .option-button.incorrect {
      border-color: var(--red);
      background: var(--red-bg);
    }

    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      color: var(--blue);
      font-weight: 800;
      flex-shrink: 0;
    }

    .option-button.correct .option-letter {
      background: #dcfce7;
      color: var(--green);
    }

    .option-button.incorrect .option-letter {
      background: #fee2e2;
      color: var(--red);
    }

    .mc-status, .feedback, .transform-feedback {
      margin-top: 0.85rem;
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      font-weight: 700;
      line-height: 1.5;
    }

    .feedback.correct, .transform-feedback.correct, .mc-status.correct {
      background: var(--green-bg);
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .feedback.incorrect, .transform-feedback.incorrect, .mc-status.incorrect {
      background: var(--red-bg);
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .answer-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .base-word-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 0.7rem;
      border-radius: 10px;
      background: #ede9fe;
      color: #5b21b6;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .input-field {
      width: 100%;
      border: 2px solid #d1d5db;
      background: white;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--blue-2);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .input-field:disabled {
      background: #f3f4f6;
      color: #6b7280;
      cursor: not-allowed;
    }

    .answer-help {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.55rem;
      line-height: 1.45;
    }

    .word-rows {
      display: grid;
      gap: 1rem;
    }

    .transform-item {
      padding: 1.1rem;
    }

    .transform-top {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      margin-bottom: 0.8rem;
    }

    .transform-body {
      flex: 1;
    }

    .transform-original {
      color: #111827;
      line-height: 1.6;
      margin-bottom: 0.8rem;
    }

    .given-word-box {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: 999px;
      padding: 0.42rem 0.8rem;
      font-size: 0.9rem;
      font-weight: 800;
      margin-bottom: 0.9rem;
    }

    .transform-complete-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      line-height: 1.9;
      font-size: 1.02rem;
    }

    .transform-prefix, .transform-suffix {
      color: #222;
    }

    .transform-input {
      min-width: 280px;
      flex: 1 1 320px;
    }

    .answer-preview {
      margin-top: 0.9rem;
      padding: 0.85rem 0.95rem;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      line-height: 1.6;
    }

    .button-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.85rem;
      margin-top: 1rem;
    }

    .button {
      border: none;
      border-radius: 14px;
      padding: 0.95rem 1.25rem;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .button-back {
      background: #374151;
      color: white;
    }

    .button-check {
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: white;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.28);
    }

    .button-retry {
      background: #f59e0b;
      color: white;
    }

    .button-next {
      background: #16a34a;
      color: white;
    }

    .button-ghost {
      background: white;
      color: #111827;
      border: 2px solid #d1d5db;
    }

    .loader-box {
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
      margin: 0 auto 1rem;
      max-width: 760px;
      text-align: center;
    }

    .loader-box h3 {
      margin-bottom: 0.65rem;
      font-size: 1.3rem;
    }

    .loader-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.92);
      margin-top: 1.4rem;
      font-size: 0.95rem;
    }

    @media (max-width: 760px) {
      body { padding: 1.2rem 0.8rem; }
      .header h1 { font-size: 2rem; }
      .card { padding: 1rem; }
      .progress-header { flex-direction: column; align-items: flex-start; }
      .exercise-title { font-size: 1.5rem; }
      .exercise-passage { padding: 1rem; }
      .exercise-passage p { font-size: 1rem; line-height: 1.85; }
      .options-grid { grid-template-columns: 1fr; }
      .transform-input { min-width: 100%; }
      .button-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="appTitle">Cambridge English Practice 🎓</h1>
      <p id="appSubtitle">Cargando ejercicios…</p>
    </div>

    <div id="loaderScreen" class="screen active">
      <div class="loader-box">
        <h3>Cargando ejercicios oficiales</h3>
        <p id="loaderMessage">Intentando abrir el archivo externo con todos los bloques oficiales.</p>
        <div class="loader-actions">
          <button class="button button-ghost" onclick="retryLoad()">Reintentar</button>
          <button class="button button-check" onclick="document.getElementById('manualJson').click()">Elegir JSON manualmente</button>
        </div>
        <input id="manualJson" type="file" accept=".json,application/json" style="display:none">
      </div>
    </div>

    <div id="homeScreen" class="screen"></div>

    <div id="typeScreen" class="screen"></div>

    <div id="exerciseScreen" class="screen exercise-screen">
      <div class="card">
        <div class="progress-section">
          <div class="progress-header">
            <h2 id="exerciseNumber">Ejercicio</h2>
            <span class="exercise-badge" id="exerciseType">Tipo</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width:0%"></div>
          </div>
        </div>

        <div class="source-box" id="sourceBox"></div>
        <div class="exercise-content" id="exerciseContent"></div>

        <div id="resultSummary" class="result-summary"></div>
        <div id="explanation" class="explanation"></div>

        <div class="button-group" id="buttonGroup"></div>
      </div>
    </div>

    <div class="footer" id="appFooter"></div>
  </div>

  <script>
    const FALLBACK_JSON = 'exercises_por_tipos_c1.json';
    let appData = null;
        let currentType = null;
    let currentExercises = [];
    let currentExerciseIndex = 0;
    let userAnswers = {};
    let showResults = false;

    const manualJson = document.getElementById('manualJson');
    manualJson.addEventListener('change', handleManualJson);

    document.addEventListener('DOMContentLoaded', () => {
      loadAppData();
    });

    async function loadAppData() {
      setLoaderMessage('Intentando abrir el archivo externo con todos los ejercicios oficiales agrupados por tipo.');
      try {
        const response = await fetch(FALLBACK_JSON, { cache: 'no-store' });
        if (!response.ok) throw new Error('No se pudo leer el JSON');
        const json = await response.json();
        initializeApp(json);
      } catch (error) {
        setLoaderMessage('No se ha podido cargar automáticamente el JSON. Esto suele pasar al abrir el HTML directamente con doble clic. Usa el botón para elegir el archivo JSON manualmente.');
      }
    }

    function retryLoad() {
      loadAppData();
    }

    async function handleManualJson(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const json = JSON.parse(text);
        initializeApp(json);
      } catch (error) {
        setLoaderMessage('El archivo seleccionado no parece un JSON válido.');
      }
    }

    function setLoaderMessage(message) {
      document.getElementById('loaderMessage').textContent = message;
    }

    function initializeApp(data) {
      appData = data;
      document.getElementById('appTitle').textContent = data.app?.title || 'Cambridge English Practice';
      document.getElementById('appSubtitle').textContent = data.app?.subtitle || '';
      document.getElementById('appFooter').textContent = data.app?.footer || '';
      userAnswers = {};
      showScreen('homeScreen');
      renderHomeScreen();
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function renderHomeScreen() {
      const screen = document.getElementById('homeScreen');
      const cards = Object.entries(appData.exerciseTypes)
        .filter(([type]) => (appData.exercisesByType?.[type] || []).length > 0)
        .map(([type, meta]) => {
          const total = (appData.exercisesByType?.[type] || []).length;
          return `
            <div class="type-card" onclick="openType('${type}')">
              <h3>${meta.icon} ${escapeHtml(meta.label)}</h3>
              <p>${escapeHtml(meta.description || '')}</p>
              <div class="type-meta">
                <span class="pill count">${total} ejercicio${total === 1 ? '' : 's'}</span>
              </div>
            </div>
          `;
        }).join('');

      screen.innerHTML = `
        <div class="panel-card">
          <div class="section-title">📚 Tipos de ejercicio</div>
          <p class="meta-line">Ahora los ejercicios están agrupados por tipo. Entra en uno y dentro verás todos los ejercicios oficiales disponibles.</p>
        </div>
        <div class="type-grid">${cards}</div>
      `;
    }

    function openType(type) {
      currentType = type;
      currentExercises = appData.exercisesByType?.[type] || [];
      currentExerciseIndex = 0;
      userAnswers = {};
      showResults = false;
      renderTypeScreen();
      showScreen('typeScreen');
    }

    function renderTypeScreen() {
      const screen = document.getElementById('typeScreen');
      const meta = appData.exerciseTypes[currentType];
      const cards = currentExercises.map((exercise, index) => {
        const totalItems = getExerciseItemCount(exercise);
        return `
          <div class="set-card" onclick="openExercise(${index})">
            <h3>${escapeHtml(exercise.title)}</h3>
            <p>${escapeHtml(exercise.instructions || exercise.note || '')}</p>
            <div class="set-meta">
              <span class="pill">${escapeHtml(exercise.source?.resource || 'Fuente oficial')}</span>
              <span class="pill secondary">Páginas ${escapeHtml(exercise.source?.pages || exercise.source?.setPages || '')}</span>
            </div>
            <div class="set-meta">
              ${exercise.source?.collectionTitle ? `<span class="pill secondary">${escapeHtml(exercise.source.collectionTitle)}</span>` : ''}
              <span class="pill count">${totalItems} ${currentType === 'sentenceTransformation' ? 'transformaciones' : currentType === 'multipleChoice' ? 'gaps' : 'huecos'}</span>
            </div>
          </div>
        `;
      }).join('');

      screen.innerHTML = `
        <div class="panel-card">
          <div class="section-title">${meta.icon} ${escapeHtml(meta.label)}</div>
          <p class="meta-line">Hay <strong>${currentExercises.length}</strong> ejercicios oficiales en esta categoría. Elige cuál quieres abrir.</p>
          <div class="loader-actions" style="justify-content:flex-start; margin-top:1rem;">
            <button class="button button-back" onclick="goHome()">← Volver a tipos</button>
          </div>
        </div>
        <div class="set-grid">${cards}</div>
      `;
    }

    function openExercise(index) {
      currentExerciseIndex = index;
      userAnswers = {};
      showResults = false;
      loadExercise(index);
      showScreen('exerciseScreen');
    }

    function goHome() {
      currentType = null;
      currentExercises = [];
      currentExerciseIndex = 0;
      userAnswers = {};
      showResults = false;
      showScreen('homeScreen');
    }

    function goToExerciseList() {
      showResults = false;
      userAnswers = {};
      renderTypeScreen();
      showScreen('typeScreen');
    }

    function loadExercise(index) {

      currentExerciseIndex = index;
      showResults = false;
      updateProgress();
      renderExerciseContent(currentExercises[index]);
      resetFeedback();
      updateButtons();
    }

    function resetFeedback() {
      const summary = document.getElementById('resultSummary');
      const explanation = document.getElementById('explanation');
      summary.classList.remove('show');
      explanation.classList.remove('show');
      summary.innerHTML = '';
      explanation.innerHTML = '';
    }

    function updateProgress() {
      const exercise = currentExercises[currentExerciseIndex];
      const progress = ((currentExerciseIndex + 1) / currentExercises.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';

      const typeMeta = appData.exerciseTypes[currentType];
      document.getElementById('exerciseNumber').textContent = `${typeMeta.label} · ${currentExerciseIndex + 1} de ${currentExercises.length}`;
      document.getElementById('exerciseType').textContent = `${typeMeta.icon} ${typeMeta.label}`;

      const sourceBox = document.getElementById('sourceBox');
      sourceBox.innerHTML = `
        <div style="font-weight:800; margin-bottom:0.35rem;">${escapeHtml(exercise.title)}</div>
        <div class="exercise-subtitle">${escapeHtml(exercise.instructions || '')}</div>
        ${exercise.note ? `<div class="meta-line" style="margin-top:0.45rem;">${escapeHtml(exercise.note)}</div>` : ''}
        <div class="set-meta" style="margin-top:0.75rem;">
          <span class="pill">${escapeHtml(exercise.source?.resource || 'Fuente oficial')}</span>
          <span class="pill secondary">Páginas ${escapeHtml(exercise.source?.pages || exercise.source?.setPages || '')}</span>
          ${exercise.source?.collectionTitle ? `<span class="pill secondary">${escapeHtml(exercise.source.collectionTitle)}</span>` : ''}
        </div>
      `;
    }

    function renderExerciseContent(exercise) {

      const content = document.getElementById('exerciseContent');
      content.innerHTML = '';

      if (currentType === 'multipleChoice') {
        renderMultipleChoice(exercise, content);
      } else if (currentType === 'fillBlanks') {
        renderFillBlanks(exercise, content);
      } else if (currentType === 'wordFormation') {
        renderWordFormation(exercise, content);
      } else if (currentType === 'sentenceTransformation') {
        renderSentenceTransformation(exercise, content);
      }
    }

    function renderMultipleChoice(exercise, container) {
      container.appendChild(createPassageBlock(exercise.text));

      const section = document.createElement('div');
      section.innerHTML = `<div class="section-title">✅ Preguntas y opciones</div>`;
      const list = document.createElement('div');
      list.className = 'question-list';

      exercise.questions.forEach((question) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const header = document.createElement('div');
        header.className = 'question-header';
        header.innerHTML = `
          <div style="display:flex; align-items:center; gap:0.65rem;">
            <span class="question-number-badge">${question.number}</span>
            <span class="question-card-title">Gap ${question.number}</span>
          </div>
        `;
        card.appendChild(header);

        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';

        Object.entries(question.options).forEach(([letter, value]) => {
          const button = document.createElement('button');
          button.className = 'option-button';
          const selected = userAnswers[questionKey(exercise.id, question.number)] === letter;
          if (selected) button.classList.add('selected');

          if (showResults) {
            if (letter === question.correct) button.classList.add('correct');
            if (selected && letter !== question.correct) button.classList.add('incorrect');
          }

          button.disabled = showResults;
          button.innerHTML = `<span class="option-letter">${letter}</span><span>${escapeHtml(value)}</span>`;
          button.addEventListener('click', () => {
            userAnswers[questionKey(exercise.id, question.number)] = letter;
            renderExerciseContent(exercise);
          });
          optionsGrid.appendChild(button);
        });

        card.appendChild(optionsGrid);

        if (showResults) {
          const selected = userAnswers[questionKey(exercise.id, question.number)];
          const status = document.createElement('div');
          const isCorrect = selected === question.correct;
          status.className = `mc-status ${isCorrect ? 'correct' : 'incorrect'}`;

          if (isCorrect) {
            status.textContent = `✓ Correcto. La respuesta es ${question.correct}: ${question.options[question.correct]}.`;
          } else if (selected) {
            status.textContent = `✗ Tu respuesta fue ${selected}. La correcta es ${question.correct}: ${question.options[question.correct]}.`;
          } else {
            status.textContent = `✗ No has respondido. La correcta es ${question.correct}: ${question.options[question.correct]}.`;
          }
          card.appendChild(status);
        }

        list.appendChild(card);
      });

      section.appendChild(list);
      container.appendChild(section);
    }

    function renderFillBlanks(exercise, container) {
      container.appendChild(createPassageBlock(exercise.text));

      const section = document.createElement('div');
      section.innerHTML = `<div class="section-title">🖊️ Hoja de respuestas</div>`;
      const grid = document.createElement('div');
      grid.className = 'answer-grid';

      exercise.blanks.forEach((blank) => {
        const card = document.createElement('div');
        card.className = 'answer-card';

        const header = document.createElement('div');
        header.className = 'answer-card-header';
        header.innerHTML = `
          <span class="gap-chip">${blank.number}</span>
          <span>Una sola palabra</span>
        `;
        card.appendChild(header);

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'input-field';
        input.placeholder = 'Escribe aquí';
        input.disabled = showResults;
        input.value = userAnswers[blankKey(exercise.id, blank.number)] || '';
        input.addEventListener('input', (e) => {
          userAnswers[blankKey(exercise.id, blank.number)] = e.target.value;
        });
        card.appendChild(input);

        const help = document.createElement('div');
        help.className = 'answer-help';
        help.textContent = 'Recuerda: solo una palabra por hueco.';
        card.appendChild(help);

        if (showResults) {
          const feedback = document.createElement('div');
          const correct = isSingleAnswerCorrect(userAnswers[blankKey(exercise.id, blank.number)], blank.answers);
          feedback.className = `feedback ${correct ? 'correct' : 'incorrect'}`;
          feedback.textContent = correct
            ? `✓ Correcto: ${formatAnswers(blank.answers).toUpperCase()}`
            : `✗ Respuesta correcta: ${formatAnswers(blank.answers).toUpperCase()}`;
          card.appendChild(feedback);
        }

        grid.appendChild(card);
      });

      section.appendChild(grid);
      container.appendChild(section);
    }

    function renderWordFormation(exercise, container) {
      container.appendChild(createPassageBlock(exercise.text));

      const section = document.createElement('div');
      section.innerHTML = `<div class="section-title">🔤 Respuestas y palabra base</div>`;

      const rows = document.createElement('div');
      rows.className = 'word-rows';

      exercise.blanks.forEach((blank) => {
        const card = document.createElement('div');
        card.className = 'answer-card';

        const header = document.createElement('div');
        header.className = 'answer-card-header';
        header.innerHTML = `
          <div style="display:flex; align-items:center; gap:0.65rem;">
            <span class="gap-chip">${blank.number}</span>
            <span class="base-word-badge">${escapeHtml(blank.base)}</span>
          </div>
          <span>Forma correcta</span>
        `;
        card.appendChild(header);

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'input-field';
        input.placeholder = 'Transforma la palabra base';
        input.disabled = showResults;
        input.value = userAnswers[blankKey(exercise.id, blank.number)] || '';
        input.addEventListener('input', (e) => {
          userAnswers[blankKey(exercise.id, blank.number)] = e.target.value;
        });
        card.appendChild(input);

        const help = document.createElement('div');
        help.className = 'answer-help';
        help.textContent = `Palabra base: ${blank.base}`;
        card.appendChild(help);

        if (showResults) {
          const feedback = document.createElement('div');
          const correct = isSingleAnswerCorrect(userAnswers[blankKey(exercise.id, blank.number)], blank.answers);
          feedback.className = `feedback ${correct ? 'correct' : 'incorrect'}`;
          feedback.textContent = correct
            ? `✓ Correcto: ${formatAnswers(blank.answers).toUpperCase()}`
            : `✗ Respuesta correcta: ${formatAnswers(blank.answers).toUpperCase()}`;
          card.appendChild(feedback);
        }

        rows.appendChild(card);
      });

      section.appendChild(rows);
      container.appendChild(section);
    }

    function renderSentenceTransformation(exercise, container) {
      const list = document.createElement('div');
      list.className = 'transformation-list';

      exercise.items.forEach((item) => {
        const block = document.createElement('div');
        block.className = 'transform-item';

        block.innerHTML = `
          <div class="transform-top">
            <span class="question-number-badge">${item.number}</span>
            <div class="transform-body">
              <div class="transform-original">${escapeHtml(item.original)}</div>
              <div class="given-word-box">Palabra dada: ${escapeHtml(item.givenWord)}</div>
            </div>
          </div>
        `;

        if (exercise.mode === 'fullSentence') {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'input-field';
          input.placeholder = 'Escribe la oración completa usando la palabra dada';
          input.disabled = showResults;
          input.value = userAnswers[transformKey(exercise.id, item.number)] || '';
          input.addEventListener('input', (e) => {
            userAnswers[transformKey(exercise.id, item.number)] = e.target.value;
          });
          block.appendChild(input);

          const help = document.createElement('div');
          help.className = 'answer-help';
          help.textContent = 'En este ejercicio se responde con la oración completa.';
          block.appendChild(help);

          if (showResults) {
            const correct = isFullSentenceCorrect(item, userAnswers[transformKey(exercise.id, item.number)]);
            const feedback = document.createElement('div');
            feedback.className = `transform-feedback ${correct ? 'correct' : 'incorrect'}`;
            feedback.textContent = correct
              ? '✓ Correcto.'
              : `✗ Respuesta aceptada: ${formatAnswers(item.answers).toUpperCase()}`;
            block.appendChild(feedback);

            const preview = document.createElement('div');
            preview.className = 'answer-preview';
            preview.innerHTML = `<strong>Respuesta aceptada:</strong><br>${escapeHtml(firstAnswer(item.answers))}`;
            block.appendChild(preview);
          }
        } else {
          const line = document.createElement('div');
          line.className = 'transform-complete-line';
          line.innerHTML = `<span class="transform-prefix">${escapeHtml(item.prefix)}</span>`;
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'input-field transform-input';
          input.placeholder = 'Escribe solo las palabras que faltan';
          input.disabled = showResults;
          input.value = userAnswers[transformKey(exercise.id, item.number)] || '';
          input.addEventListener('input', (e) => {
            userAnswers[transformKey(exercise.id, item.number)] = e.target.value;
          });
          line.appendChild(input);

          const suffix = document.createElement('span');
          suffix.className = 'transform-suffix';
          suffix.textContent = item.suffix;
          line.appendChild(suffix);
          block.appendChild(line);

          const help = document.createElement('div');
          help.className = 'answer-help';
          help.textContent = 'Escribe entre 3 y 6 palabras incluyendo la palabra dada.';
          block.appendChild(help);

          if (showResults) {
            const correct = isTransformationCorrect(item, userAnswers[transformKey(exercise.id, item.number)]);
            const feedback = document.createElement('div');
            feedback.className = `transform-feedback ${correct ? 'correct' : 'incorrect'}`;
            feedback.textContent = correct
              ? '✓ Correcto.'
              : `✗ Respuesta correcta: ${formatAnswers(item.answers).toUpperCase()}`;
            block.appendChild(feedback);

            const preview = document.createElement('div');
            preview.className = 'answer-preview';
            preview.innerHTML = `<strong>Oración completa aceptada:</strong><br>${escapeHtml(buildFullSentence(item, firstAnswer(item.answers)))}`;
            block.appendChild(preview);
          }
        }

        list.appendChild(block);
      });

      container.appendChild(list);
    }

    function createPassageBlock(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'exercise-passage';
      wrapper.innerHTML = formatPassageHtml(text);
      return wrapper;
    }

    function formatPassageHtml(text) {
      const paragraphs = text.split('\n\n').map(paragraph => {
        let htmlText = escapeHtml(paragraph);

        htmlText = htmlText.replace(/\{\{(\d+)\|([A-Z']+)\}\}/g, (_, number, base) => {
          return `<span class="inline-gap"><span class="gap-number">(${number})</span><span class="gap-line"></span><span class="gap-base-inline">${base}</span></span>`;
        });

        htmlText = htmlText.replace(/\{\{(\d+)\}\}/g, (_, number) => {
          return `<span class="inline-gap"><span class="gap-number">(${number})</span><span class="gap-line"></span></span>`;
        });

        return `<p>${htmlText}</p>`;
      });

      return paragraphs.join('');
    }

    function questionKey(exerciseId, number) {
      return `${exerciseId}-q-${number}`;
    }

    function blankKey(exerciseId, number) {
      return `${exerciseId}-blank-${number}`;
    }

    function transformKey(exerciseId, number) {
      return `${exerciseId}-transform-${number}`;
    }

    function normalizeText(value) {
      return (value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[’‘]/g, "'")
        .replace(/[^a-z0-9'\s-]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function ensureArray(value) {
      if (Array.isArray(value)) return value;
      if (value === undefined || value === null) return [];
      return [value];
    }

    function firstAnswer(value) {
      return ensureArray(value)[0] || '';
    }

    function formatAnswers(value) {
      return ensureArray(value).join(' / ');
    }

    function isSingleAnswerCorrect(userValue, correctAnswers) {
      const normalizedInput = normalizeText(userValue);
      return ensureArray(correctAnswers).some(answer => normalizeText(answer) === normalizedInput);
    }

    function buildFullSentence(item, fragment) {
      return `${item.prefix} ${fragment} ${item.suffix}`.replace(/\s+/g, ' ').trim();
    }

    function isTransformationCorrect(item, userValue) {
      const normalizedInput = normalizeText(userValue);
      return ensureArray(item.answers).some(answer => {
        const normalizedAnswer = normalizeText(answer);
        const normalizedFull = normalizeText(buildFullSentence(item, answer));
        return normalizedInput === normalizedAnswer || normalizedInput === normalizedFull;
      });
    }

    function isFullSentenceCorrect(item, userValue) {
      const normalizedInput = normalizeText(userValue);
      return ensureArray(item.answers).some(answer => normalizeText(answer) === normalizedInput);
    }

    function getExerciseItemCount(exercise) {
      if (currentType === 'multipleChoice') return exercise.questions.length;
      if (currentType === 'fillBlanks' || currentType === 'wordFormation') return exercise.blanks.length;
      return exercise.items.length;
    }

    function getScore(exercise) {
      if (currentType === 'multipleChoice') {
        const total = exercise.questions.length;
        const correct = exercise.questions.filter(q => userAnswers[questionKey(exercise.id, q.number)] === q.correct).length;
        return { correct, total };
      }

      if (currentType === 'fillBlanks' || currentType === 'wordFormation') {
        const total = exercise.blanks.length;
        const correct = exercise.blanks.filter(blank => isSingleAnswerCorrect(userAnswers[blankKey(exercise.id, blank.number)], blank.answers)).length;
        return { correct, total };
      }

      const total = exercise.items.length;
      const correct = exercise.items.filter(item => {
        const value = userAnswers[transformKey(exercise.id, item.number)];
        return exercise.mode === 'fullSentence' ? isFullSentenceCorrect(item, value) : isTransformationCorrect(item, value);
      }).length;
      return { correct, total };
    }

    function checkAnswer() {
      showResults = true;
      const exercise = currentExercises[currentExerciseIndex];
      renderExerciseContent(exercise);

      const score = getScore(exercise);
      const summary = document.getElementById('resultSummary');
      summary.classList.add('show');
      summary.innerHTML = `
        <h3 style="margin-bottom:0.4rem;">📊 Resultado</h3>
        <p>Has acertado <strong>${score.correct}</strong> de <strong>${score.total}</strong> respuestas.</p>
      `;

      const explanation = document.getElementById('explanation');
      explanation.classList.add('show');
      explanation.innerHTML = `
        <h3 style="margin-bottom:0.4rem;">📚 Pista de corrección</h3>
        <p>${escapeHtml(exercise.explanation || 'Revisa las respuestas correctas y vuelve a intentarlo.')}</p>
      `;

      updateButtons();
    }

    function updateButtons() {
      const group = document.getElementById('buttonGroup');

      if (!showResults) {
        group.innerHTML = `
          <button class="button button-back" onclick="goToExerciseList()">← Ejercicios</button>
          <button class="button button-ghost" onclick="goHome()">Tipos</button>
          <button class="button button-check" onclick="checkAnswer()">Comprobar ✓</button>
        `;
      } else {
        const nextDisabled = currentExerciseIndex >= currentExercises.length - 1;
        group.innerHTML = `
          <button class="button button-back" onclick="goToExerciseList()">← Ejercicios</button>
          <button class="button button-retry" onclick="retryExercise()">Intentar de nuevo</button>
          <button class="button button-next" ${nextDisabled ? 'disabled' : ''} onclick="nextExercise()">Siguiente</button>
        `;
      }
    }

    function retryExercise() {
      loadExercise(currentExerciseIndex);
    }

    function nextExercise() {
      if (currentExerciseIndex < currentExercises.length - 1) {
        loadExercise(currentExerciseIndex + 1);
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
